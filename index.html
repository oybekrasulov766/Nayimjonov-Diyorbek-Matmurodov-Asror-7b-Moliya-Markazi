<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Premium Dashboard</title>
    
    <!-- Chart.js va Google Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 10%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Mobil uchun yuqoridan boshlash */
            margin: 0;
            color: white;
            padding: 10px;
        }

        .dashboard {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 25px;
            width: 100%;
            max-width: 950px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: slideUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            margin-top: 10px;
        }

        /* MOBIL OPTIMIZATSIYA */
        @media (max-width: 850px) {
            body { padding: 10px; align-items: stretch; }
            .dashboard { 
                grid-template-columns: 1fr; 
                padding: 20px;
                gap: 20px;
                border-radius: 30px;
            }
            h2 { font-size: 1.6rem !important; }
            .chart-container { padding: 15px; }
            input, select, button { font-size: 16px !important; } /* iOS zoom oldini olish uchun */
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 20px 0;
            text-align: center;
        }

        .chart-container {
            position: relative;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ultraChart {
            max-width: 100% !important;
            height: auto !important;
        }

        /* INPUTLAR VA TUGMALAR */
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { color: #94a3b8; font-size: 0.75rem; font-weight: 600; padding-left: 5px; }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
            appearance: none; /* Select o'qi uchun */
        }

        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            grid-column: span 2;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            margin-bottom: 5px;
        }

        .btn-alt {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid var(--border);
        }

        button:active { transform: scale(0.96); opacity: 0.9; }

        /* STATISTIKA RO'YXATI */
        .stats-list { 
            margin-top: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; 
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border-left: 3px solid var(--primary);
        }

        .stat-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; }
        .stat-value { font-size: 1rem; font-weight: 700; color: var(--accent); }

    </style>
</head>
<body>

    <div class="dashboard">
        <!-- VIZUAL QISM -->
        <div class="visual-section">
            <h2>Moliya Markazi</h2>
            <div class="chart-container">
                <canvas id="ultraChart"></canvas>
            </div>
            
            <div class="stats-list" id="statsList">
                <!-- Statlar shu yerda chiqadi -->
            </div>
        </div>

        <!-- BOSHQARUV QISMI -->
        <div class="input-section">
            <div style="background: rgba(0,0,0,0.25); padding: 20px; border-radius: 25px; border: 1px solid var(--border);">
                <h3 style="margin: 0 0 15px 0; color:#fff; font-size:1.1rem; text-align: center;">Boshqaruv paneli</h3>
                
                <div class="controls">
                    <div class="field">
                        <label>SUMMA ($)</label>
                        <input type="number" id="val" placeholder="Masalan: 2500" inputmode="decimal">
                    </div>
                    
                    <div class="field">
                        <label>KATEGORIYA Tanlang</label>
                        <select id="cat">
                            <option value="0">Investitsiya 📈</option>
                            <option value="1">Sayohat 🏝️</option>
                            <option value="2">Ta'lim 🎓</option>
                            <option value="3">Sog'liq 🍏</option>
                            <option value="4">Zaxira 🏦</option>
                        </select>
                    </div>

                    <button class="btn-main" onclick="updateData()">Ma'lumotni Yangilash</button>
                    
                    <div class="btn-group">
                        <button class="btn-alt" onclick="randomize()">🎲 Tasodifiy</button>
                        <button class="btn-alt" onclick="resetData()">🧹 Tozalash</button>
                    </div>
                </div>
            </div>
            
            <p style="text-align:center; font-size:0.65rem; color:#475569; margin-top:15px; letter-spacing: 1px;">
                © 2026 PREMIUM DASHBOARD V2.1
            </p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('ultraChart').getContext('2d');
        
        let myData = [4500, 2800, 1500, 1000, 3200];
        const labels = ['Investitsiya', 'Sayohat', 'Ta\'lim', 'Sog\'liq', 'Zaxira'];
        const colors = ['#6366f1', '#a855f7', '#22d3ee', '#10b981', '#f59e0b'];

        let ultraChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: myData,
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 20,
                    borderRadius: 12,
                    spacing: 5
                }]
            },
            options: {
                cutout: '75%',
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                animation: { duration: 1500, easing: 'easeOutExpo' }
            }
        });

        function renderTable() {
            const container = document.getElementById('statsList');
            container.innerHTML = '';
            myData.forEach((val, i) => {
                container.innerHTML += `
                    <div class="stat-item" style="border-left-color: ${colors[i]}">
                        <span class="stat-label">${labels[i]}</span>
                        <span class="stat-value">$${val.toLocaleString()}</span>
                    </div>
                `;
            });
        }

        function updateData() {
            const v = document.getElementById('val').value;
            const i = document.getElementById('cat').value;
            if(v && v >= 0) {
                myData[i] = parseFloat(v);
                ultraChart.data.datasets[0].data = myData;
                ultraChart.update();
                renderTable();
                document.getElementById('val').value = '';
                // Mobil klaviaturani yopish
                document.activeElement.blur();
            }
        }

        function randomize() {
            myData = myData.map(() => Math.floor(Math.random() * 8000) + 500);
            ultraChart.data.datasets[0].data = myData;
            ultraChart.update();
            renderTable();
        }

        function resetData() {
            myData = [0, 0, 0, 0, 0];
            ultraChart.data.datasets[0].data = myData;
            ultraChart.update();
            renderTable();
        }

        renderTable();
    </script>
</body>
</html>
